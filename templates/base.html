{% load static %}
<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ site_name }}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script defer src="{% static 'js/app.js' %}"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <a class="brand" href="{% url 'home' %}">{{ site_name }}</a>
        <nav class="nav">
          {% if user.is_authenticated %}
            <span class="nav-item">你好，{{ user.username }}</span>
            <a class="nav-item" href="{% url 'accounts:logout' %}">退出</a>
          {% else %}
            <a class="nav-item" href="{% url 'accounts:login' %}">登录</a>
            <a class="nav-item" href="{% url 'accounts:register' %}">注册</a>
          {% endif %}
          <a class="nav-item" href="{% url 'accounts:password_reset' %}">忘记密码</a>
        </nav>
      </div>
    </header>
    <main class="container">
      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="message">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
